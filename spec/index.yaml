# yaml-language-server: $schema=../schemas/spec.schema.json
#
# Starter spec for docs-generator.
# Edit these values, then run: go run ./cmd/server -spec ./spec/index.yaml
#
# For a fuller example with multiple sections, guides, screens, and events,
# see examples/ in this repository.

info:
  title: My API
  version: "1.0.0"
  description: Replace this with your own API description.
  base_urls:
    - label: Production
      url: https://api.example.com
      default: true
    - label: Staging
      url: https://staging.api.example.com
    - label: Local
      url: http://localhost:8080

authentication:
  methods:
    - type: Bearer JWT
      header: Authorization
      format: "Bearer <token>"
      description: Obtain a JWT from your auth provider and send it on every request.

sections:
  - id: hello
    title: Hello
    description: A sample endpoint group — rename or replace.
    endpoints:
      - name: Ping
        method: GET
        path: /ping
        auth: none
        description: Liveness check.
      - name: Create item
        method: POST
        path: /items
        auth: JWT
        description: Create a new item.
        body:
          - name: name
            type: string
            required: true
            description: Human-readable name.
          - name: quantity
            type: integer
            required: false
            description: Initial quantity.
        example_body: |
          {
            "name": "Widget",
            "quantity": 10
          }

api_tester_defaults:
  methods: [GET, POST, PATCH, DELETE]
  auth_modes:
    - name: JWT Bearer
      header: Authorization
      prefix: "Bearer "
      placeholder: YOUR_JWT_TOKEN_HERE
