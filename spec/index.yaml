# Museum Service API Specification
# Single source of truth untuk dokumentasi

info:
  title: Museum Service API
  version: "1.0.0"
  description: API untuk Museum Digital Indonesia - Single Museum Pattern
  base_url: https://museumdigi.id
  base_urls:
    - label: Production
      url: https://museumdigi.id
      default: true
    - label: Staging
      url: https://staging.museumdigi.id
    - label: Local
      url: http://localhost:8080
  overview_cards:
    - icon: "🚀"
      title: "REST API"
      description: "API untuk Museum Digital Indonesia - Single Museum Pattern"
      content: |
        Museum Service API menggunakan arsitektur RESTful. Semua komunikasi dilakukan melalui HTTP request dengan response format JSON.

        **Base URL:** Semua endpoint diakses melalui base URL yang bisa dipilih (Production / Staging / Local).

        **HTTP Methods:**
        - `GET` — Membaca data
        - `POST` — Membuat data baru atau melakukan aksi
        - `PATCH` — Update sebagian data
        - `DELETE` — Menghapus data

        **Response Format:**
        Semua response menggunakan format JSON. Response berhasil mengembalikan data yang diminta, sedangkan error mengembalikan object dengan pesan error.

        **Status Codes:**
        - `200 OK` — Request berhasil
        - `201 Created` — Data berhasil dibuat
        - `400 Bad Request` — Parameter tidak valid
        - `401 Unauthorized` — Auth token tidak valid atau tidak ada
        - `403 Forbidden` — Tidak punya permission
        - `404 Not Found` — Resource tidak ditemukan
        - `500 Internal Server Error` — Error di server

    - icon: "📚"
      title: "Multiple Endpoints"
      description: "Comprehensive API endpoints for all your needs"
      content: |
        API menyediakan endpoint-endpoint untuk mengelola semua resource Museum Digital:

        **Museum:**
        - Get, Update, Delete museum milik organization
        - Update museum image

        **Artifacts:**
        - List artifacts (public/authenticated)
        - Create, Get, Update, Delete artifact
        - Update artifact image dan 3D model

        **Articles (CMS):**
        - List articles dengan filter dan pagination
        - Get article by slug (public) atau by ID
        - Create, Update, Delete, Restore article

        **File Upload:**
        - Upload via Media Service (terpisah)
        - Simpan URL ke museum/artifact

    - icon: "📖"
      title: "Interactive Docs"
      description: "Test API directly from this documentation"
      content: |
        Dokumentasi ini dilengkapi dengan API Tester built-in di setiap endpoint.

        **Cara menggunakan:**
        1. Klik endpoint yang ingin di-test di sidebar
        2. Klik tombol "Try It" di bawah detail endpoint
        3. Pilih metode autentikasi (JWT Bearer / API Key / Public)
        4. Edit request body jika diperlukan
        5. Klik "Send" untuk mengirim request

        **Fitur:**
        - Pilih environment (Production / Staging / Local)
        - Request body pre-filled dari example
        - Response dengan syntax highlighting
        - Status code indicator (success/error)

        **Credentials:**
        Simpan token di halaman "Credentials" — tersimpan per environment di browser localStorage.

    - icon: "🔐"
      title: "Secure Auth"
      description: "Bearer JWT, API Key authentication support"
      content: |
        Semua endpoint yang membutuhkan autentikasi bisa menggunakan salah satu metode:

        **1. Bearer JWT**
        - Login ke Account Service untuk mendapatkan JWT token
        - Kirim via header: `Authorization: Bearer <token>`
        - Token berisi: account_id, organization_id, permissions

        **2. API Key**
        - Dapatkan API Key dari Account Service
        - Kirim via header: `X-API-Key: <api_key>`
        - Backend otomatis exchange API Key ke JWT (cached 1 jam)
        - Cocok untuk service-to-service, CLI, atau background jobs

        **Permissions:**
        Setiap endpoint dilindungi oleh permission tertentu (misal: `museum:write`, `artifact:delete`). Permission tersemat di dalam JWT token.

authentication:
  methods:
    - type: Bearer JWT
      header: Authorization
      format: "Bearer <token>"
      source: Account Service
      description: Untuk user login yang sudah autentikasi
      token_contains:
        - account_id
        - organization_id
        - permissions
    - type: API Key
      header: X-API-Key
      format: "<api_key>"
      source: Account Service (via token exchange)
      description: Untuk service-to-service, CLI, atau background jobs
      note: Backend akan otomatis exchange API Key menjadi JWT dan cache hasilnya

flow_overview:
  methods:
    - type: Bearer JWT
      steps:
        - title: "Login ke Account Service"
          detail: "Autentikasi menggunakan email/password ke Account Service. Response berisi JWT token yang berisi account_id, organization_id, dan permissions."
        - title: "Simpan token"
          detail: "Simpan JWT token di localStorage browser atau secure storage di aplikasi client."
        - title: "Kirim token di setiap request"
          detail: "Tambahkan header Authorization: Bearer <token> di setiap API request yang membutuhkan autentikasi."
        - title: "Museum di-identifikasi dari JWT"
          detail: "org_id yang ada di JWT token digunakan untuk mengidentifikasi museum. Tidak perlu museum_id di URL path."
    - type: API Key
      steps:
        - title: "Dapatkan API Key"
          detail: "Minta API Key dari Account Service. Biasanya digunakan untuk service-to-service, CLI, atau background jobs."
        - title: "Kirim API Key di setiap request"
          detail: "Tambahkan header X-API-Key: <api_key> di setiap API request."
        - title: "Backend exchange API Key ke JWT"
          detail: "Backend otomatis exchange API Key menjadi JWT dengan caching 1 jam (3600 detik) untuk mengurangi pemanggilan ke Account Service."
        - title: "JWT digunakan untuk autentikasi"
          detail: "JWT hasil exchange digunakan sama seperti Bearer JWT biasa untuk autentikasi dan otorisasi endpoint."
  note: "Semua endpoint yang membutuhkan autentikasi bisa menggunakan salah satu metode (JWT atau X-API-Key)"

permissions:
  - name: museum:read
    description: Baca museum
  - name: museum:write
    description: Create/update museum
  - name: museum:delete
    description: Delete museum
  - name: artifact:read
    description: Baca artifact
  - name: artifact:write
    description: Create/update artifact
  - name: artifact:delete
    description: Delete artifact
  - name: media:upload
    description: Upload file ke Media Service
  - name: media:download
    description: Download file dari Media Service

constraints:
  - One Organization = One Museum (satu org hanya bisa punya satu museum)
  - JWT token (dari Bearer atau X-API-Key exchange) wajib ada organization_id
  - File upload harus melalui Media Service
  - X-API-Key akan di-exchange menjadi JWT dengan expiry 1 jam (3600 detik)
  - JWT hasil exchange di-cache di backend untuk mengurangi pemanggilan ke Account Service

