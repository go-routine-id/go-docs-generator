# File Upload Guide
guides:
  - id: file_upload
    icon: "📤"
    title: File Upload Flow
    description: Museum Service tidak handle upload file langsung, menggunakan Media Service
    flow:
      - step: 1
        title: Upload ke Media Service
        endpoint:
          method: POST
          path: /api/v1/upload
          service: Media Service (bukan Museum Service)
          content_type: multipart/form-data
          auth: required
          auth_methods: [Bearer JWT, X-API-Key]
          permission: media:upload
          fields:
            - name: file
              type: binary
              required: true
              description: File yang mau diupload (image, 3D model, document)
            - name: folder_id
              type: string
              required: false
              description: ID folder (optional)
        curl_example_jwt: |
          curl -X POST https://museumdigi.id/api/v1/upload \
            -H "Authorization: Bearer TOKEN" \
            -H "Content-Type: multipart/form-data" \
            -F "file=@photo.jpg" \
            -F "folder_id=optional-folder-id"
        curl_example_api_key: |
          curl -X POST https://museumdigi.id/api/v1/upload \
            -H "X-API-Key: YOUR_API_KEY" \
            -H "Content-Type: multipart/form-data" \
            -F "file=@photo.jpg" \
            -F "folder_id=optional-folder-id"
        response_example: |
          {
            "success": true,
            "data": {
              "media_id": "abc123-def456",
              "url": "https://museumdigi.id/api/v1/media/abc123-def456",
              "thumbnail_url": "https://museumdigi.id/api/v1/media/abc123-def456?size=thumb"
            }
          }

      - step: 2
        title: Simpan media_id ke Museum/Artifact
        description: |
          Gunakan media_id (bukan URL) dari response Media Service.
          Frontend mengkonstruksi URL untuk menampilkan file: https://museumdigi.id/api/v1/media/{media_id}
        actions:
          - type: update_museum_image
            description: Update museum image
            endpoint: POST /api/v1/museum/image
            field: image_media_id
          - type: update_artifact_image
            description: Update artifact image
            endpoint: POST /api/v1/artifacts/{id}/image
            field: image_media_id
        tip: |
          Backend menyimpan media_id (UUID), bukan full URL.
          Untuk menampilkan file di frontend: https://museumdigi.id/api/v1/media/{media_id}
