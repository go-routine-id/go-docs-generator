# Museum Service API Specification
# Single source of truth untuk dokumentasi

info:
  title: Museum Service API
  version: "1.0.0"
  description: API untuk Museum Digital Indonesia - Single Museum Pattern
  base_url: https://museumdigi.id

authentication:
  methods:
    - type: Bearer JWT
      header: Authorization
      format: "Bearer <token>"
      source: Account Service
      description: Untuk user login yang sudah autentikasi
      token_contains:
        - account_id
        - organization_id
        - permissions
    - type: API Key
      header: X-API-Key
      format: "<api_key>"
      source: Account Service (via token exchange)
      description: Untuk service-to-service, CLI, atau background jobs
      note: Backend akan otomatis exchange API Key menjadi JWT dan cache hasilnya

flow_overview:
  steps_jwt:
    - "Login ke Account Service → dapat JWT token"
    - "Simpan token di localStorage/browser"
    - "Kirim token di setiap request dengan header Authorization: Bearer <token>"
    - "Museum di-identifikasi dari org_id dalam JWT (bukan URL path)"
  steps_api_key:
    - "Dapatkan API Key dari Account Service (untuk service/client)"
    - "Kirim API Key di setiap request dengan header X-API-Key: <api_key>"
    - "Backend akan exchange API Key ke JWT (dengan caching 1 jam)"
    - "JWT hasil exchange digunakan untuk autentikasi dan otorisasi"
  note: "Semua endpoint yang membutuhkan autentikasi bisa menggunakan salah satu metode (JWT atau X-API-Key)"

sections:
  - id: museum
    title: My Museum (Single Museum Pattern)
    description: Setiap organization hanya memiliki satu museum
    endpoints:
      - name: Get My Museum
        method: GET
        path: /api/v1/museum
        auth: required
        description: Ambil museum milik organization dari JWT org_id
        response: Museum object
        example_response: |
          {
            "id": "f6c857ea-5428-427f-b7bb-a19bfaeff6cf",
            "organization_id": "d6450e6c-c4ea-4e9f-a4d3-c9cf0c755d6a",
            "name": "Museum Gangelang",
            "location": "Bali",
            "description": "Museum untuk organisasi ini",
            "image_url": "https://media.museumdigi.id/media/abc123/photo.jpg",
            "contact_info": "",
            "artifact_count": 0,
            "created_at": "2026-03-02T16:09:02+07:00",
            "updated_at": "2026-03-02T16:09:02+07:00"
          }

      - name: Update My Museum
        method: PATCH
        path: /api/v1/museum
        auth: required
        permission: museum:write
        description: Update data museum milik organization
        body:
          - name: name
            type: string
            required: false
            example: "Museum Gangelang Updated"
          - name: location
            type: string
            required: false
            example: "Jakarta Pusat"
          - name: description
            type: string
            required: false
            example: "Deskripsi museum yang diupdate"
          - name: image_url
            type: string
            required: false
            example: "https://media.museumdigi.id/media/abc123/photo.jpg"
          - name: contact_info
            type: string
            required: false
            example: "+62 812-3456-7890"
        example_body: |
          {
            "name": "Museum Gangelang Updated",
            "location": "Bali",
            "description": "Updated description"
          }

      - name: Delete My Museum
        method: DELETE
        path: /api/v1/museum
        auth: required
        permission: museum:delete
        description: Hapus museum milik organization

      - name: Update Museum Image
        method: POST
        path: /api/v1/museum/image
        auth: required
        permission: museum:write
        description: Update image URL museum (URL dari Media Service)
        body:
          - name: image_url
            type: string
            required: true
            example: "https://media.museumdigi.id/media/abc123/photo.jpg"
        example_body: |
          {
            "image_url": "https://media.museumdigi.id/media/xyz789/updated.jpg"
          }

  - id: artifacts
    title: Artifacts
    description: Kelola koleksi artifact museum
    endpoints:
      - name: List Artifacts
        method: GET
        path: /api/v1/artifacts
        auth: optional
        description: List semua artifact (public) atau filter by org (authenticated)
        query_params:
          - name: page
            type: integer
            required: false
            default: 1
            description: Halaman ke-
          - name: page_size
            type: integer
            required: false
            default: 9
            description: Jumlah item per halaman
          - name: search
            type: string
            required: false
            description: Cari berdasarkan nama/description

      - name: Create Artifact
        method: POST
        path: /api/v1/artifacts
        auth: required
        permission: artifact:write
        description: Buat artifact baru
        body:
          - name: museum_id
            type: string (uuid)
            required: true
            description: ID museum pemilik
          - name: name
            type: string
            required: true
            description: Nama artifact
          - name: description
            type: string
            required: false
          - name: category
            type: string
            required: false
            example: "historical"
          - name: era
            type: string
            required: false
            example: "ancient"
          - name: origin
            type: string
            required: false
            example: "Indonesia"
          - name: status
            type: string
            required: false
            example: "active"
          - name: image_url
            type: string
            required: false
            description: URL dari Media Service
          - name: model3d_url
            type: string
            required: false
            description: URL 3D model dari Media Service
        example_body: |
          {
            "museum_id": "f6c857ea-5428-427f-b7bb-a19bfaeff6cf",
            "name": "Candi Borobudur Miniature",
            "description": "Miniatur candi skala 1:100",
            "category": "historical",
            "era": "Modern",
            "origin": "Indonesia",
            "status": "active",
            "image_url": "https://media.museumdigi.id/media/art123/photo.jpg",
            "model3d_url": "https://media.museumdigi.id/media/3d123/model.glb"
          }

      - name: Get Artifact
        method: GET
        path: /api/v1/artifacts/{id}
        auth: optional
        description: Ambil detail artifact by ID

      - name: Update Artifact
        method: PATCH
        path: /api/v1/artifacts/{id}
        auth: required
        permission: artifact:write
        description: Update data artifact
        body:
          - name: name
            type: string
            required: false
          - name: description
            type: string
            required: false
          - name: image_url
            type: string
            required: false
          - name: model3d_url
            type: string
            required: false
        example_body: |
          {
            "name": "Artifact Updated",
            "description": "Updated description",
            "image_url": "https://media.museumdigi.id/media/art456/new-photo.jpg"
          }

      - name: Delete Artifact
        method: DELETE
        path: /api/v1/artifacts/{id}
        auth: required
        permission: artifact:delete
        description: Hapus artifact

      - name: Update Artifact Image
        method: POST
        path: /api/v1/artifacts/{id}/image
        auth: required
        permission: artifact:write
        description: Update image URL artifact
        body:
          - name: image_url
            type: string
            required: true
        example_body: |
          {
            "image_url": "https://media.museumdigi.id/media/art789/image.jpg"
          }

  - id: articles
    title: Articles (CMS)
    description: Kelola artikel/berita museum dan konten artifact
    endpoints:
      - name: List Articles
        method: GET
        path: /api/v1/articles
        auth: optional
        description: List semua artikel dengan filter dan pagination
        query_params:
          - name: page
            type: integer
            required: false
            default: 1
            description: Halaman ke-
          - name: page_size
            type: integer
            required: false
            default: 12
            description: Jumlah item per halaman
          - name: museum_id
            type: string (uuid)
            required: false
            description: Filter berdasarkan museum
          - name: type
            type: string
            required: false
            description: Filter berdasarkan tipe (news, artifact_detail)
          - name: search
            type: string
            required: false
            description: Cari berdasarkan judul/konten
          - name: is_published
            type: boolean
            required: false
            description: Filter berdasarkan status publish
          - name: include_deleted
            type: boolean
            required: false
            default: false
            description: Sertakan artikel yang sudah dihapus (admin only)
        example_response: |
          {
            "data": [
              {
                "id": "art-123",
                "museum_id": "museum-456",
                "user_id": "user-789",
                "type": "news",
                "title": "Pameran Baru Dibuka",
                "slug": "pameran-baru-dibuka-1709523456",
                "excerpt": "Kami dengan bangga mengumumkan...",
                "content_html": "<h1>Pameran Baru</h1><p>Kami dengan bangga...</p>",
                "cover_image": "https://media.museumdigi.id/media/art123/cover.jpg",
                "is_published": true,
                "published_at": "2024-03-15T10:00:00Z",
                "created_at": "2024-03-10T08:00:00Z",
                "updated_at": "2024-03-15T09:00:00Z"
              }
            ],
            "meta": {
              "page": 1,
              "page_size": 12,
              "total": 1,
              "total_pages": 1
            }
          }

      - name: Get Article by Slug (Public)
        method: GET
        path: /api/v1/articles/slug/{slug}
        auth: optional
        description: Ambil artikel by slug (untuk akses publik)
        note: Hanya mengembalikan artikel yang sudah dipublish

      - name: Get Article by ID
        method: GET
        path: /api/v1/articles/{id}
        auth: optional
        description: Ambil detail artikel by ID

      - name: Create Article
        method: POST
        path: /api/v1/articles
        auth: required
        permission: article:write
        description: Buat artikel baru
        body:
          - name: museum_id
            type: string (uuid)
            required: true
            description: ID museum pemilik
          - name: type
            type: string
            required: true
            enum: [news, artifact_detail]
            description: Tipe artikel
          - name: artifact_id
            type: string (uuid)
            required: false
            description: Wajib jika type = artifact_detail
          - name: title
            type: string
            required: true
            max_length: 255
            description: Judul artikel
          - name: slug
            type: string
            required: false
            max_length: 255
            description: URL slug (auto-generate jika kosong)
          - name: content
            type: string (markdown)
            required: true
            description: Konten artikel dalam format Markdown
          - name: cover_image
            type: string
            required: false
            description: URL cover image dari Media Service
          - name: is_published
            type: boolean
            required: false
            default: false
            description: Status publish
        example_body: |
          {
            "museum_id": "f6c857ea-5428-427f-b7bb-a19bfaeff6cf",
            "type": "news",
            "title": "Pameran Sejarah Indonesia 2024",
            "content": "# Pameran Sejarah Indonesia\n\nKami dengan **bangga** mengumumkan...",
            "cover_image": "https://media.museumdigi.id/media/art123/cover.jpg",
            "is_published": true
          }

      - name: Update Article
        method: PATCH
        path: /api/v1/articles/{id}
        auth: required
        permission: article:write
        description: Update data artikel
        body:
          - name: type
            type: string
            required: false
            enum: [news, artifact_detail]
          - name: artifact_id
            type: string (uuid)
            required: false
          - name: title
            type: string
            required: false
            max_length: 255
          - name: slug
            type: string
            required: false
            max_length: 255
          - name: content
            type: string (markdown)
            required: false
          - name: cover_image
            type: string
            required: false
          - name: is_published
            type: boolean
            required: false
        note: Field yang tidak diisi tidak akan diupdate

      - name: Delete Article
        method: DELETE
        path: /api/v1/articles/{id}
        auth: required
        permission: article:delete
        description: Soft-delete artikel

      - name: Restore Article
        method: POST
        path: /api/v1/articles/{id}/restore
        auth: required
        permission: article:write
        description: Restore artikel yang sudah dihapus

  - id: file_upload
    title: File Upload Flow
    description: Museum Service tidak handle upload file langsung
    flow:
      - step: 1
        title: Upload ke Media Service
        endpoint:
          method: POST
          path: /api/v1/upload
          service: Media Service (bukan Museum Service)
          content_type: multipart/form-data
          auth: required
          auth_methods: [Bearer JWT, X-API-Key]
          permission: media:upload
          fields:
            - name: file
              type: binary
              required: true
              description: File yang mau diupload (image, 3D model, document)
            - name: folder_id
              type: string
              required: false
              description: ID folder (optional)
        curl_example_jwt: |
          curl -X POST https://museumdigi.id/api/v1/upload \
            -H "Authorization: Bearer TOKEN" \
            -H "Content-Type: multipart/form-data" \
            -F "file=@photo.jpg" \
            -F "folder_id=optional-folder-id"
        curl_example_api_key: |
          curl -X POST https://museumdigi.id/api/v1/upload \
            -H "X-API-Key: YOUR_API_KEY" \
            -H "Content-Type: multipart/form-data" \
            -F "file=@photo.jpg" \
            -F "folder_id=optional-folder-id"
        response_example: |
          {
            "success": true,
            "data": {
              "media_id": "abc123...",
              "url": "https://media.museumdigi.id/media/abc123/photo.jpg",
              "thumbnail_url": "https://media.museumdigi.id/media/abc123/thumb.jpg"
            }
          }

      - step: 2
        title: Simpan URL ke Museum/Artifact
        description: Gunakan URL dari response Media Service
        actions:
          - type: update_museum_image
            description: Update museum image
            endpoint: POST /api/v1/museum/image
          - type: update_artifact_image
            description: Update artifact image
            endpoint: POST /api/v1/artifacts/{id}/image
        tip: Simpan juga media_id di database jika perlu reference untuk delete/update

permissions:
  - name: museum:read
    description: Baca museum
  - name: museum:write
    description: Create/update museum
  - name: museum:delete
    description: Delete museum
  - name: artifact:read
    description: Baca artifact
  - name: artifact:write
    description: Create/update artifact
  - name: artifact:delete
    description: Delete artifact
  - name: media:upload
    description: Upload file ke Media Service
  - name: media:download
    description: Download file dari Media Service

constraints:
  - One Organization = One Museum (satu org hanya bisa punya satu museum)
  - JWT token (dari Bearer atau X-API-Key exchange) wajib ada organization_id
  - File upload harus melalui Media Service
  - X-API-Key akan di-exchange menjadi JWT dengan expiry 1 jam (3600 detik)
  - JWT hasil exchange di-cache di backend untuk mengurangi pemanggilan ke Account Service

